<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вайфу.нет — Главная</title>
  <link rel="stylesheet" href="style.css">
  <style>
    main { text-align: left; max-width: 640px; margin: 0 auto; }

    #welcomeUser { text-align: center; color: #ff69b4; font-size: 1.5rem; margin: 1.5rem 0 1rem; }

    .post-form {
      background: #1a1a33;
      border: 1px solid #444466;
      border-radius: 16px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .post-form textarea {
      width: 100%;
      background: #0f0f1f;
      border: 1px solid #555;
      border-radius: 10px;
      color: white;
      padding: 0.8rem;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .post-form button {
      margin-top: 0.8rem;
      width: 100%;
    }

    .post {
      background: #1a1a33;
      border: 1px solid #333355;
      border-radius: 16px;
      padding: 1.2rem;
      margin-bottom: 1rem;
    }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.8rem; }
    .post-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #ff69b4; }
    .post-author { font-weight: bold; color: #ff99ff; }
    .post-time { font-size: 0.8rem; color: #888; }
    .post-content { color: #e0e0ff; line-height: 1.6; margin-bottom: 0.8rem; }
    .post-actions { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.5rem; }

    .like-btn {
      background: none;
      border: 1px solid #555;
      color: #ccc;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      width: auto;
      margin: 0;
      transition: 0.2s;
    }
    .like-btn.liked { border-color: #ff69b4; color: #ff69b4; }
    .like-btn:hover { border-color: #ff69b4; }
    .comment-count { color: #888; font-size: 0.9rem; }

    .comments { margin-top: 0.5rem; }
    .comment {
      background: #0f0f1f;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      margin: 0.4rem 0;
      font-size: 0.9rem;
    }
    .comment-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
    .comment-author { color: #ff99ff; font-weight: bold; }
    .comment-time { color: #666; font-size: 0.75rem; }

    .comment-form { display: flex; gap: 8px; margin-top: 0.6rem; }
    .comment-input {
      flex: 1;
      background: #0f0f1f;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      padding: 0.5rem 0.8rem;
      font-size: 0.9rem;
      width: auto;
      margin: 0;
    }
    .voice-btn, .send-comment-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      width: auto;
      margin: 0;
    }
    .voice-btn { background: #2a2a4a; color: white; }
    .voice-btn.recording { background: #ff3333; }
    .send-comment-btn { background: #ff69b4; color: black; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Вайфу.нет 💜</div>
    <nav>
      <a href="index.html">Главная</a>
      <a href="profile.html">Профиль</a>
      <a href="search.html">Поиск</a>
      <a href="chat.html">Чаты</a>
      <a href="#" id="logout">Выйти</a>
    </nav>
  </header>

  <main>
    <div id="welcomeUser"></div>

    <div class="post-form">
      <textarea id="postText" placeholder="Что думаешь, отаку? 🌸"></textarea>
      <button onclick="createPost()">Опубликовать</button>
    </div>

    <div id="feed"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
