<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вайфу.нет — Чаты</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #chatWindow {
      background: #1a1a33;
      border: 1px solid #444;
      border-radius: 12px;
      height: 400px;
      overflow-y: auto;
      padding: 1rem;
      margin: 1rem 0;
    }
    .message {
      margin: 0.8rem 0;
      padding: 0.8rem;
      border-radius: 12px;
      max-width: 80%;
    }
    .my-msg {
      background: #ff69b4;
      color: black;
      margin-left: auto;
    }
    .other-msg {
      background: #2a2a4a;
    }
    #messageInput {
      width: 80%;
      display: inline-block;
    }
    #sendBtn {
      width: 18%;
      margin-left: 2%;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Вайфу.нет 💜</div>
    <nav>
      <a href="home.html">Главная</a>
      <a href="search.html">Поиск</a>
      <a href="chat.html">Чаты</a>
      <a href="#" id="logout">Выйти</a>
    </nav>
  </header>

  <main>
    <h1 class="welcome">Чаты</h1>

    <div id="userList"></div>

    <div id="chatArea" class="hidden">
      <h3>Чат с <span id="chatWith"></span></h3>
      <div id="chatWindow"></div>
      <input type="text" id="messageInput" placeholder="Напиши сообщение...">
      <button id="sendBtn">Отправить</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
